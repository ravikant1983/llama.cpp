name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    # SonarQube Scan
    - name: SonarQube Scan
      uses: sonarsource/sonarqube-scan-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST }}

    # Build Docker Image
    - name: Build Image
      run: docker build -t rkg1983/llama:${{ github.sha }} .

    # Trivy Scan
    - name: Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: rkg1983/llama:${{ github.sha }}
        severity: CRITICAL,HIGH
        exit-code: '1'

    # Push Image
    - name: Push Image
      run: |
        echo ${{ secrets.DOCKER_PASS }} | docker login -u ${{ secrets.DOCKER_USER }} --password-stdin
        docker push rkg1983/llama:${{ github.sha }}

    # Update GitOps Repo
    - name: Update GitOps
      run: |
        git clone https://github.com/<your-username>/llama-gitops.git
        cd llama-gitops
        sed -i "s|image:.*|image: rkg1983/llama:${{ github.sha }}|g" deployment.yaml
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git commit -am "update image"
        git push
